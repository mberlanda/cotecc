name: App Build
on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CoteccApp
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Use Node 18.x
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: CoteccApp/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Lint
      run: npm run lint
    - name: Test
      run: npm run test -- --coverage
  api-unit-tests:
    name: API Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cotecc-api
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Use Node 18.x
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: cotecc-api/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Test
      run: npm test
  web-docker-image:
    name: Web Docker Image
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Build web image
      run: docker compose build cotecc-web
    - name: Start web service
      run: docker compose up -d cotecc-web
    - name: Ping web service
      run: curl --fail --retry 10 --retry-delay 2 --retry-connrefused http://localhost:8080/health
    - name: Show compose logs
      if: failure()
      run: docker compose logs cotecc-web
    - name: Stop compose services
      if: always()
      run: docker compose down --volumes
