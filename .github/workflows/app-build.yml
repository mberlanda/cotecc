name: App Build
on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CoteccApp
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Use Node 18.x
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        cache-dependency-path: CoteccApp/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Lint
      run: npm run lint
    - name: Test
      run: npm run test -- --coverage
