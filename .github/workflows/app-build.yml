name: App Build
on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Use Node 18.x
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    - name: Install dependencies
      run: npm install --include=dev
      working-directory: CoteccApp
    - name: Lint
      run: npm run lint
      working-directory: CoteccApp
    - name: Test
      run: npm run test
      working-directory: CoteccApp
