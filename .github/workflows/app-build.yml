name: App Build
on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CoteccApp
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Use Node 22.x
      uses: actions/setup-node@v6
      with:
        node-version: '22.x'
        cache: 'npm'
        cache-dependency-path: CoteccApp/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Lint
      run: npm run lint
    - name: Typecheck
      run: npm run typecheck
    - name: Test
      run: npm run test -- --coverage
  web-e2e:
    name: Web E2E (host-served bundle)
    runs-on: ubuntu-latest
    # CI acceptance path (no device): Playwright drives a real browser against the
    # headless Node host serving the REAL exported bundle — the same embedded-server
    # logic the native host runs (Phase 1A §4.1, QA-002/003). The smoke spec asserting
    # the SPA renders is also criterion 8's render layer (wired, not just mapped).
    defaults:
      run:
        working-directory: CoteccApp
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Use Node 22.x
      uses: actions/setup-node@v6
      with:
        node-version: '22.x'
        cache: 'npm'
        cache-dependency-path: CoteccApp/package-lock.json
    - name: Install dependencies
      run: npm ci
      env:
        HUSKY: '0'
    - name: Install Playwright browser
      run: npx playwright install --with-deps chromium
    - name: Export embedded web bundle
      run: npm run embed:web
    - name: Run Playwright E2E (starts the Node host harness)
      run: npm run e2e
      env:
        CI: 'true'
    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report
        path: CoteccApp/playwright-report
        retention-days: 7

  web-docker-image:
    name: Web Docker Image
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Build web image
      run: docker compose build cotecc-web
    - name: Start web service
      run: docker compose up -d cotecc-web
    - name: Ping web service
      run: curl --fail --retry 10 --retry-delay 2 --retry-connrefused http://localhost:8080/health
    - name: Install render smoke test dependencies
      working-directory: tools/screenshots
      run: npm ci
    - name: Install Playwright browser
      working-directory: tools/screenshots
      run: npx playwright install --with-deps chromium
    - name: Assert web app renders
      working-directory: tools/screenshots
      run: npm run assert:web-render
    - name: Show compose logs
      if: failure()
      run: docker compose logs cotecc-web
    - name: Stop compose services
      if: always()
      run: docker compose down --volumes
